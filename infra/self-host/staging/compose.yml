services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      ASSETS_DOMAIN: ${ASSETS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      API_PORT: ${API_PORT}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web/current:/srv/tongpin-web/current:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - tongpin_backend

  api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "if [ ! -d node_modules/argon2 ] || [ ! -d node_modules/pg ] || [ ! -d node_modules/@aws-sdk/client-s3 ]; then npm ci --omit=dev; fi; node src/server.mjs"]
    environment:
      NODE_ENV: production
      API_ENV: ${API_ENV}
      PORT: ${API_PORT}
      SERVICE_NAME: tongpin-self-host-api
      APP_ORIGIN: https://${APP_DOMAIN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: https://${ASSETS_DOMAIN}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_COUPLE_MEDIA_BUCKET: couple-media
      MINIO_PROFILE_AVATAR_BUCKET: profile-avatars
      STORAGE_MAX_THUMBNAIL_UPLOAD_BYTES: ${STORAGE_MAX_THUMBNAIL_UPLOAD_BYTES:-1048576}
      STORAGE_MAX_AVATAR_UPLOAD_BYTES: ${STORAGE_MAX_AVATAR_UPLOAD_BYTES:-4194304}
      STORAGE_MAX_AVATAR_THUMBNAIL_BYTES: ${STORAGE_MAX_AVATAR_THUMBNAIL_BYTES:-1048576}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AUTH_ACCESS_TOKEN_KEYS: ${AUTH_ACCESS_TOKEN_KEYS:-}
      AUTH_ACCESS_TOKEN_CURRENT_KID: ${AUTH_ACCESS_TOKEN_CURRENT_KID:-}
      AUTH_REFRESH_TOKEN_PEPPER: ${AUTH_REFRESH_TOKEN_PEPPER}
      AUTH_EMAIL_DELIVERY_CONFIGURED: ${AUTH_EMAIL_DELIVERY_CONFIGURED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      EMAIL_FROM: ${EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      AUTH_EMAIL_VERIFY_URL_BASE: ${AUTH_EMAIL_VERIFY_URL_BASE:-}
      AUTH_PASSWORD_RESET_URL_BASE: ${AUTH_PASSWORD_RESET_URL_BASE:-}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      SUPABASE_STORAGE_S3_ENDPOINT: ${SUPABASE_STORAGE_S3_ENDPOINT:-}
      SUPABASE_STORAGE_S3_REGION: ${SUPABASE_STORAGE_S3_REGION:-}
      SUPABASE_STORAGE_S3_ACCESS_KEY_ID: ${SUPABASE_STORAGE_S3_ACCESS_KEY_ID:-}
      SUPABASE_STORAGE_S3_SECRET_ACCESS_KEY: ${SUPABASE_STORAGE_S3_SECRET_ACCESS_KEY:-}
    ports:
      - "127.0.0.1:${API_PORT}:${API_PORT}"
    volumes:
      - ./runtime/api/package.json:/app/package.json:ro
      - ./runtime/api/package-lock.json:/app/package-lock.json:ro
      - ./runtime/api/src:/app/src:ro
      - ./runtime/api/scripts:/app/scripts:ro
      - api_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tongpin_backend

  worker:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "if [ ! -d node_modules/pg ] || [ ! -d node_modules/web-push ]; then npm ci --omit=dev; fi; node src/pushWorker.mjs"]
    environment:
      NODE_ENV: production
      API_ENV: ${API_ENV}
      SERVICE_NAME: tongpin-self-host-push-worker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AUTH_REFRESH_TOKEN_PEPPER: ${AUTH_REFRESH_TOKEN_PEPPER}
      PUSH_WORKER_ENABLED: ${PUSH_WORKER_ENABLED:-true}
      PUSH_WORKER_INTERVAL_MS: ${PUSH_WORKER_INTERVAL_MS:-10000}
      PUSH_WORKER_MAX_DELIVERIES_PER_RUN: ${PUSH_WORKER_MAX_DELIVERIES_PER_RUN:-50}
      PUSH_WORKER_MAX_DELIVERY_ATTEMPTS: ${PUSH_WORKER_MAX_DELIVERY_ATTEMPTS:-3}
      WEB_PUSH_VAPID_SUBJECT: ${WEB_PUSH_VAPID_SUBJECT:-mailto:admin@fancah.tech}
      WEB_PUSH_VAPID_PUBLIC_KEY: ${WEB_PUSH_VAPID_PUBLIC_KEY:-}
      WEB_PUSH_VAPID_PRIVATE_KEY: ${WEB_PUSH_VAPID_PRIVATE_KEY:-}
    volumes:
      - ./runtime/api/package.json:/app/package.json:ro
      - ./runtime/api/package-lock.json:/app/package-lock.json:ro
      - ./runtime/api/src:/app/src:ro
      - worker_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tongpin_backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./runtime/db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tongpin_backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "${REDIS_MAXMEMORY}", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tongpin_backend

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - tongpin_backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN:-}"]
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - tongpin_backend

networks:
  tongpin_backend:
    driver: bridge

volumes:
  api_node_modules:
  worker_node_modules:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
