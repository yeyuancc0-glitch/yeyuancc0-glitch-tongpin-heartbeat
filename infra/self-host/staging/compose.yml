services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      ASSETS_DOMAIN: ${ASSETS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      API_PORT: ${API_PORT}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - tongpin_backend

  api:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: ["node", "health-server.mjs"]
    environment:
      NODE_ENV: production
      API_ENV: ${API_ENV}
      PORT: ${API_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    ports:
      - "127.0.0.1:${API_PORT}:${API_PORT}"
    volumes:
      - ./runtime/health-server.mjs:/app/health-server.mjs:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tongpin_backend

  worker:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: ["node", "worker-placeholder.mjs"]
    environment:
      NODE_ENV: production
      API_ENV: ${API_ENV}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./runtime/worker-placeholder.mjs:/app/worker-placeholder.mjs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tongpin_backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tongpin_backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "${REDIS_MAXMEMORY}", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tongpin_backend

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - tongpin_backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN}"]
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - tongpin_backend

networks:
  tongpin_backend:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
